name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run sample helper
        run: python -m latex_word_helper examples/synthetic_paper --out examples/output

      - name: Validate public assets
        run: python scripts/validate_public_assets.py
